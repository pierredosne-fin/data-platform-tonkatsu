version: 2

models:
  - name: {model_name}
    description: "{business_name}"
    columns:
      - name: log_id
        description: "Primary identifier for this model."
        data_tests:
          - unique
          - not_null
      - name: entity_id
        description: "Entity reference."
      - name: created_at
        description: "Timestamp when record was created."
      - name: updated_at
        description: "Timestamp when record was last updated."
